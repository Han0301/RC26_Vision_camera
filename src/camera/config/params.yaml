# ============================================================
# KFS Locator 参数配置文件
# 修改此文件后无需重新编译，重启程序即可生效
# ============================================================

# ---------- 目标检测参数 (set_detect.h) ----------
detect:
  cloud_depth_min: 200          # 深度最小值 (mm)，低于此值视为无效
  cloud_depth_max: 2000         # 深度最大值 (mm)，高于此值视为无效
  yolo_model_path: "/home/h/下载/卷轴检测blue/best"   # YOLO 模型路径
  yolo_device: "cpu"            # 推理设备: "cpu" / "cuda"
  yolo_conf_threshold: 0.75     # 置信度阈值
  yolo_nms_threshold: 0.75      # NMS 阈值
  yolo_score_threshold: 0.75    # 分数阈值

# ---------- 平面拟合参数 (set_plane.h) ----------
plane:
  box_size: 0.35                # 目标方体边长 (m)，用于计算体中心偏移
  leaf_size_xy: 0.010           # 体素滤波 XY 尺寸 (m)，值越大点云越稀疏
  leaf_size_z: 0.005            # 体素滤波 Z 尺寸 (m)
  distance_threshold: 0.016     # RANSAC 平面拟合距离阈值 (m)，值越大拟合范围越大
  max_iterations: 1000          # RANSAC 最大迭代次数
  cluster_tolerance: 0.012      # 欧式聚类容差 (m)，值越大聚类范围越大
  min_plane_inliers: 100        # 平面拟合最小内点数，低于此值视为无效

# ---------- 结果计算参数 (set_result.h) ----------
result:
  ema_alpha: 0.15               # EMA 法向量滤波系数 (0.05~0.3)，越小越平滑

# ---------- 坐标系偏差 (set_bias_to_result 输入) ----------
# 当相机与目标坐标系朝向一致时，只需设置 x, y, z
bias_to_target:
  x: 0.0
  y: 0.0
  z: 0.0
  roll: 0.0
  pitch: 0.0
  yaw: 0.0
